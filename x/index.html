<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stole — stole.cc</title>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..900&family=Source+Code+Pro:wght@400;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent-orange: #FF8C42;
            --accent-coral:  #FF6B35;
            --accent-pink:   #F77F88;
            --accent-gold:   #FFB703;
        }

        #bg-video {
            position: fixed;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: brightness(0.45);
        }

        #bg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1;
        }

        /* ── Click-to-Enter Overlay ── */
        #enter-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(6,6,6,0.52);
            backdrop-filter: blur(14px) saturate(1.3);
            -webkit-backdrop-filter: blur(14px) saturate(1.3);
            cursor: pointer;
            transition: opacity 0.7s cubic-bezier(0.4,0,0.2,1);
        }
        #enter-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        .enter-text {
            font-family: 'Bitcount Prop Single', monospace;
            font-size: 42px;
            font-weight: 400;
            color: rgba(255,255,255,0.82);
            letter-spacing: 2px;
            text-transform: lowercase;
            animation: enter-pulse 2.8s ease-in-out infinite;
            transition: color 0.2s, text-shadow 0.2s;
            user-select: none;
        }
        #enter-overlay:hover .enter-text {
            color: #fff;
            text-shadow: 0 0 40px rgba(255,140,66,0.55), 0 0 80px rgba(255,140,66,0.2);
        }
        @keyframes enter-pulse {
            0%,100% { text-shadow: 0 0 20px rgba(255,140,66,0.15); }
            50%      { text-shadow: 0 0 50px rgba(255,140,66,0.4), 0 0 100px rgba(255,140,66,0.15); }
        }

        /* Volume control */
        #vol-wrap {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(15,15,15,0.75);
            border: 1px solid rgba(255,140,66,0.25);
            border-radius: 4px;
            padding: 8px 14px;
            backdrop-filter: blur(6px);
        }
        #vol-wrap svg { flex-shrink: 0; }
        #vol-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 90px; height: 3px;
            border-radius: 2px;
            background: rgba(255,140,66,0.25);
            outline: none;
            cursor: pointer;
        }
        #vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-coral));
            cursor: pointer;
        }
        #vol-slider::-moz-range-thumb {
            width: 12px; height: 12px;
            border: none; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-coral));
            cursor: pointer;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px 100px;
            position: relative;
        }

        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            background: rgba(12,12,12,0.78);
            border: 1px solid rgba(255,140,66,0.22);
            border-radius: 6px;
            padding: 36px 32px 32px;
            backdrop-filter: blur(18px);
            box-shadow:
                0 0 40px rgba(255,140,66,0.08),
                inset 0 0 40px rgba(255,140,66,0.02);
            animation: fadeUp 0.7s ease both;
            transform-style: preserve-3d;
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
            transition: box-shadow 0.15s ease, border-color 0.15s ease;
            will-change: transform;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,140,66,0.35), transparent);
            border-radius: 6px 6px 0 0;
            transition: opacity 0.3s;
        }
        /* Glare overlay (guns.lol style) */
        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 6px;
            pointer-events: none;
            background: radial-gradient(
                circle at var(--mx, 50%) var(--my, 50%),
                rgba(255,140,66,0.13) 0%,
                transparent 65%
            );
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .card:hover::after { opacity: 1; }
        .card:hover {
            border-color: rgba(255,140,66,0.5);
            box-shadow:
                0 0 60px rgba(255,140,66,0.18),
                0 30px 60px -20px rgba(0,0,0,0.6),
                inset 0 0 40px rgba(255,140,66,0.04);
        }

        .avatar-wrap {
            position: relative;
            width: 90px; height: 90px;
            margin: 0 auto 18px;
        }
        .avatar {
            width: 90px; height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,140,66,0.4);
            display: block;
            transition: border-color 0.3s;
        }
        .avatar:hover { border-color: var(--accent-orange); }
        .avatar-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid rgba(255,140,66,0.2);
            animation: spin 8s linear infinite;
            pointer-events: none;
        }

        .name-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .username {
            font-family: 'Source Code Pro', monospace;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .bio {
            font-size: 12px;
            font-weight: 500;
            color: rgba(232,232,232,0.6);
            text-align: center;
            font-style: italic;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }

        /* Badges */
        .badges {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        .badge {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .badge-icon {
            width: 34px; height: 34px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, filter 0.2s;
            cursor: default;
        }
        .badge-icon svg { width: 22px; height: 22px; }
        .badge-icon:hover {
            transform: scale(1.2) translateY(-3px);
            filter: drop-shadow(0 0 6px rgba(255,140,66,0.55));
        }
        /* verified uses the original image */
        .badge-icon img {
            width: 26px; height: 26px;
            object-fit: contain;
        }
        .badge-tip {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15,15,15,0.92);
            border: 1px solid rgba(255,140,66,0.3);
            color: rgba(232,232,232,0.85);
            font-size: 10px;
            font-family: 'Source Code Pro', monospace;
            padding: 3px 8px;
            border-radius: 3px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 20;
        }
        .badge:hover .badge-tip { opacity: 1; }

        .divider {
            border: none;
            border-top: 1px solid rgba(255,140,66,0.15);
            margin: 0 0 20px;
        }

        .socials { display: flex; flex-direction: column; gap: 10px; }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 16px;
            border: 1px solid rgba(255,140,66,0.2);
            border-radius: 4px;
            background: rgba(255,140,66,0.04);
            color: rgba(232,232,232,0.85);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Source Code Pro', monospace;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .social-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(255,140,66,0.08), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }
        .social-btn:hover {
            border-color: rgba(255,140,66,0.5);
            transform: translateX(4px);
            box-shadow: 0 0 14px rgba(255,140,66,0.1);
            color: #fff;
        }
        .social-btn:hover::before { opacity: 1; }
        .social-btn:active { transform: translateX(2px) scale(0.99); }
        .social-icon { width: 20px; height: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .social-icon svg { width: 18px; height: 18px; }
        .social-label { flex: 1; }
        .social-arrow { margin-left: auto; opacity: 0.4; font-size: 12px; transition: opacity 0.2s, transform 0.2s; }
        .social-btn:hover .social-arrow { opacity: 1; transform: translateX(3px); }

        .card-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 10px;
            font-family: 'Source Code Pro', monospace;
            color: rgba(255,140,66,0.35);
            letter-spacing: 1px;
        }

        @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
        @keyframes spin   { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

        @media (max-width:520px) {
            .card { padding: 28px 20px 24px; }
            .username { font-size: 18px; }
            #vol-wrap { bottom: 12px; right: 12px; padding: 6px 10px; }
            #vol-slider { width: 70px; }
        }
    </style>
</head>

    <script>
        const video   = document.getElementById('bg-video');
        const slider  = document.getElementById('vol-slider');
        const overlay = document.getElementById('enter-overlay');

        video.muted  = true;
        video.volume = 0.5;

        function enterSite() {
            overlay.classList.add('fade-out');
            setTimeout(() => overlay.remove(), 750);
        }

        slider.addEventListener('input', () => {
            video.volume = parseFloat(slider.value);
        });

        /* ── 3D Tilt (guns.lol style) ── */
        const card = document.querySelector('.card');
        const STRENGTH = 12;   // max tilt angle in degrees
        const SCALE    = 1.03; // slight zoom on hover

        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const cx   = rect.left + rect.width  / 2;
            const cy   = rect.top  + rect.height / 2;
            const dx   = (e.clientX - cx) / (rect.width  / 2);
            const dy   = (e.clientY - cy) / (rect.height / 2);

            const rotX = -dy * STRENGTH;
            const rotY =  dx * STRENGTH;

            // glare position (percentage)
            const mx = ((e.clientX - rect.left) / rect.width  * 100).toFixed(1);
            const my = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1);
            card.style.setProperty('--mx', mx + '%');
            card.style.setProperty('--my', my + '%');

            card.style.transform =
                `perspective(1000px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(${SCALE})`;
        });

        card.addEventListener('mouseleave', () => {
            card.style.transform =
                `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)`;
            card.style.transition = 'transform 0.6s cubic-bezier(0.23,1,0.32,1), box-shadow 0.3s ease, border-color 0.15s ease';
            // reset transition to snappy after spring-back
            setTimeout(() => {
                card.style.transition = 'box-shadow 0.15s ease, border-color 0.15s ease';
            }, 650);
        });

        card.addEventListener('mouseenter', () => {
            card.style.transition = 'transform 0.1s ease, box-shadow 0.15s ease, border-color 0.15s ease';
        });
    </script>
