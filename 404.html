<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — stole.cc</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;600;700&family=Montserrat:wght@400;500;600&family=Bitcount+Grid+Double&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary-dark: #0f0f0f;
            --primary-light: #f5f5f5;
            --accent-orange: #FF8C42;
            --accent-coral: #FF6B35;
            --accent-pink: #F77F88;
            --accent-gold: #FFB703;
            --text-dark: #1a1a1a;
            --text-light: #e8e8e8;
        }

        body {
            background-color: var(--primary-dark);
            background-image:
                radial-gradient(circle at 20% 50%, rgba(255, 140, 66, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 107, 53, 0.08) 0%, transparent 50%);
            color: var(--text-light);
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            line-height: 1.6;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body.light-mode {
            background-color: #e8e8e8;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(255, 140, 66, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 107, 53, 0.08) 0%, transparent 50%);
            color: var(--text-dark);
        }

        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-coral));
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 12px;
            transition: all 0.3s ease;
            z-index: 1000;
            animation: fadeIn 0.6s ease-out 0.3s both;
        }

        .mode-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 140, 66, 0.4);
        }

        .header-section {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        .error-code {
            font-size: 120px;
            font-weight: 700;
            font-family: 'Source Code Pro', monospace;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            filter: drop-shadow(0 0 30px rgba(255, 140, 66, 0.2));
            animation: fadeInTitle 0.9s ease-out;
        }

        .title {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 2px;
            font-family: 'Source Code Pro', monospace;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 10px 0;
            animation: fadeInTitle 0.9s ease-out;
        }

        .subtitle {
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-coral));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .prompt-box {
            background-color: var(--primary-dark);
            border: 1px solid rgba(255, 140, 66, 0.3);
            border-radius: 4px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow:
                0 0 20px rgba(255, 140, 66, 0.1),
                inset 0 0 20px rgba(255, 140, 66, 0.02);
            animation: fadeInUp 0.8s ease-out 0.2s both;
            position: relative;
            transition: all 0.3s ease;
        }

        body.light-mode .prompt-box {
            background-color: var(--primary-light);
            border-color: rgba(255, 107, 53, 0.2);
            box-shadow:
                0 0 20px rgba(255, 107, 53, 0.08),
                inset 0 0 20px rgba(255, 107, 53, 0.01);
        }

        .prompt-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 140, 66, 0.3), transparent);
            animation: slideRight 2s ease-in-out infinite;
        }

        .prompt-header {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 140, 66, 0.2);
        }

        body.light-mode .prompt-header {
            border-bottom-color: rgba(255, 107, 53, 0.2);
        }

        .window-button {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-coral), var(--accent-orange));
        }
        .window-button.yellow { background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange)); }
        .window-button.green  { background: linear-gradient(135deg, var(--accent-pink), var(--accent-coral)); }

        .command {
            margin: 16px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .command:hover {
            transform: translateX(5px);
            filter: drop-shadow(0 0 8px rgba(255, 140, 66, 0.3));
        }

        .prefix {
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-coral));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            user-select: none;
            font-weight: bold;
            min-width: max-content;
        }

        .label {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-width: 100px;
        }

        a {
            color: white;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-coral));
            text-decoration: none;
            padding: 6px 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 140, 66, 0.5);
            font-weight: bold;
            border-radius: 2px;
            display: inline-block;
            font-family: 'Bitcount Grid Double', monospace;
        }

        a:hover {
            background: linear-gradient(135deg, var(--accent-coral), var(--accent-pink));
            border-color: var(--accent-pink);
            box-shadow: 0 0 15px rgba(255, 140, 66, 0.4);
            transform: scale(1.05);
        }

        a:active { transform: scale(0.95); }

        .footer {
            margin-top: 60px;
            font-size: 12px;
            color: rgba(255, 140, 66, 0.6);
            text-align: center;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        body.light-mode .footer { color: rgba(255, 107, 53, 0.6); }

        .cursor {
            display: inline-block;
            width: 8px; height: 16px;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-coral));
            margin-left: 4px;
            animation: blink 1s step-end infinite;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInTitle { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }
        @keyframes slideRight {
            0%, 100% { opacity: 0.3; transform: translateX(-100%); }
            50% { opacity: 1; transform: translateX(0); }
        }
        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

        @media (max-width: 768px) {
            .error-code { font-size: 80px; }
            .title { font-size: 32px; }
            .prompt-box { padding: 20px; }
            .command { flex-wrap: wrap; }
            .mode-toggle { padding: 6px 12px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <button class="mode-toggle" id="modeToggle" onclick="toggleDarkMode()">
        <svg id="modeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:8px;">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="white"></path>
        </svg>
        <span id="modeLabel">LIGHT MODE</span>
    </button>

    <div class="header-section">
        <div class="error-code">404</div>
        <div class="title">[not found]</div>
        <div class="subtitle">> PAGE DOES NOT EXIST</div>
    </div>

    <div class="prompt-box">
        <div class="prompt-header">
            <div class="window-button"></div>
            <div class="window-button yellow"></div>
            <div class="window-button green"></div>
        </div>

        <div class="command">
            <span class="prefix">$</span>
            <span class="label">error:</span>
            <span style="color: rgba(255,140,66,0.8); font-size:14px;">path not found on this server</span>
        </div>

        <div class="command">
            <span class="prefix">$</span>
            <span class="label">suggestion:</span>
            <a href="/">back to home</a>
        </div>

        <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255, 140, 66, 0.2);">
            <span class="prefix">$<span class="cursor"></span></span>
        </div>
    </div>

    <div class="footer">
        © 2026 stole.cc | all rights reserved
    </div>

    <script>
        const modeToggle = document.getElementById('modeToggle');
        const modeLabel  = document.getElementById('modeLabel');
        const modeIcon   = document.getElementById('modeIcon');

        window.addEventListener('load', () => {
            const isDarkMode = localStorage.getItem('darkMode') !== 'false';
            if (!isDarkMode) document.body.classList.add('light-mode');
            updateModeButton();
        });

        function toggleDarkMode() {
            document.body.classList.toggle('light-mode');
            const isNowLight = document.body.classList.contains('light-mode');
            localStorage.setItem('darkMode', isNowLight ? 'false' : 'true');
            updateModeButton();
        }

        function updateModeButton() {
            const isLight = document.body.classList.contains('light-mode');
            if (isLight) {
                modeLabel.textContent = 'DARK MODE';
                modeIcon.innerHTML = `<path d="M6.76 4.84l-1.8-1.79L4.22 4.6l1.79 1.8 0.75-1.56zM1 13h3v-2H1v2zm10 8h2v-3h-2v3zM17.24 19.16l0.75 1.56 1.79-1.79-1.56-0.75-1-1.52zM20 11v2h3v-2h-3zM12 5a7 7 0 100 14 7 7 0 000-14z" fill="white" />`;
            } else {
                modeLabel.textContent = 'LIGHT MODE';
                modeIcon.innerHTML = `<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="white" />`;
            }
        }
    </script>
</body>
</html>
